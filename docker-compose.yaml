services:
  db:
    container_name: respawn_db
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 2s
      retries: 2
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: respawn_api
    ports:
      - "${OUT_PORT}:8080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=${DB_SSLMODE}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      GIN_MODE: ${GIN_MODE}
    depends_on:
      db:
        condition: service_healthy
volumes:
  pgdata: {}